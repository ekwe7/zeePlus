name: Zee Plus CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  master:
    name: master
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x zeePlus-server/gradlew

      - name: Run Tests
        run: cd zeePlus-server && ./gradlew clean test

  test:
    name: Test on ${{ matrix.os }} / Java ${{ matrix.java }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            java: 21
          - os: ubuntu-latest
            java: 25
          - os: windows-latest
            java: 21
          - os: macos-latest
            java: 21
          - os: macos-latest
            java: 25

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Make gradlew executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x zeePlus-server/gradlew

      - name: Run Tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: cd zeePlus-server && ./gradlew clean test

      - name: Run Tests (Windows)
        if: runner.os == 'Windows'
        run: cd zeePlus-server && .\gradlew.bat clean test

  build:
    name: Build Jar (Ubuntu only)
    runs-on: ubuntu-latest
    needs: master

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x zeePlus-server/gradlew

      - name: Build Project
        run: cd zeePlus-server && ./gradlew clean build

  publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Push Docker Image
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: ekwe7/zeeplus-server
          tags: latest
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          dockerfile: zeePlus-server/Dockerfile
